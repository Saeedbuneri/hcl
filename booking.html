<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Book an appointment or request a home sample collection at Healthcare Clinical Laboratory - Jowar, Buner in Buner. Fast, easy, and affordable diagnostic services.">
    <meta name="keywords" content="Book Blood Test, Home Sample Collection, Healthcare Clinical Laboratory - Jowar, Buner Appointment, Buner">
    <title>Book an Appointment - Healthcare Clinical Laboratory - Jowar, Buner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #10b981 0%, #047857 100%);
            min-height: 100vh;
        }
        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: calc(100vh - 70px);
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            padding: 40px;
            width: 90%;
            max-width: 600px;
            margin: 20px 0;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .logo { color: #047857; font-size: 28px; font-weight: bold; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 16px; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select {
            width: 100%; padding: 12px; border: 2px solid #e1e5e9;
            border-radius: 8px; font-size: 16px; transition: border-color 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: #10b981; }
        .btn {
            width: 100%; background: linear-gradient(135deg, #25D366, #128C7E);
            color: white; border: none; padding: 15px; border-radius: 8px;
            font-size: 18px; font-weight: 600; cursor: pointer; transition: transform 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37, 211, 102, 0.4); }
        /* Universal Navbar CSS */
        nav { background: white; padding: 15px 40px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); position: relative; z-index: 1000; display: flex; justify-content: space-between; align-items: center; width: 100%; font-family: 'Segoe UI', sans-serif;}
        .nav-brand { text-decoration: none; display: flex; align-items: center; gap: 10px; }
        .nav-brand span { font-size: 22px; font-weight: 800; color: #333; letter-spacing: -0.5px; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-link { color: #555; text-decoration: none; font-weight: 600; font-size: 15px; transition: color 0.2s; }
        .nav-link:hover { color: #4a90e2; }
        .nav-btn { background: #4a90e2; color: white; padding: 10px 24px; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 15px; transition: all 0.2s; }
        .nav-btn:hover { background: #357abd; transform: translateY(-2px); box-shadow: 0 4px 10px rgba(74,144,226,0.3); }
        /* WhatsApp Widget Styles */
        .wa-float { position: fixed; bottom: 25px; right: 25px; background: #25D366; color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 5px 20px rgba(37,211,102,0.4); z-index: 1000; transition: transform 0.2s; cursor: pointer; border: none; }
        .wa-float:hover { transform: scale(1.1); }
        .wa-float svg { width: 35px; height: 35px; fill: currentColor; }
        
        .wa-popup { position: fixed; bottom: 100px; right: 25px; width: 320px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); z-index: 1000; overflow: hidden; display: none; transform-origin: bottom right; font-family: 'Segoe UI', sans-serif;}
        .wa-popup.show { display: block; animation: popupAnim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popupAnim { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .wa-header { background: #075E54; color: white; padding: 15px 20px; display: flex; align-items: center; gap: 10px; font-weight: bold; position: relative; }
        .wa-close { position: absolute; right: 15px; top: 15px; color: white; background: none; border: none; font-size: 24px; font-weight: bold; cursor: pointer; }
        
        .wa-body { padding: 20px; background: #ece5dd; }
        .wa-form-group-wa { margin-bottom: 15px; text-align: left; }
        .wa-form-group-wa label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; font-weight: 600; }
        .wa-select, .wa-textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 14px; font-family: inherit; }
        .wa-textarea { resize: none; height: 80px; }
        .wa-select:focus, .wa-textarea:focus { outline: none; border-color: #25D366; }
        
        .wa-send-btn { width: 100%; background: #25D366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; display: flex; justify-content: center; align-items: center; gap: 8px; transition: background 0.2s; }
        .wa-send-btn:hover { background: #128C7E; }
        @media (max-width: 600px) {
            .container { padding: 20px; width: 95%; margin: 10px 0; border-radius: 12px; }
            .logo { font-size: 24px; margin-bottom: 8px; }
            .subtitle { font-size: 14px; margin-bottom: 15px; }
            input, select { padding: 10px; font-size: 15px; }
            .btn { font-size: 16px; padding: 12px; }
            .form-group { margin-bottom: 15px; }
        }
        
        @media (max-width: 768px) {
            nav { padding: 15px 20px; }
            #mobileMenuBtn { display: block; }
            .nav-links { display: none; position: absolute; top: 100%; left: 0; width: 100%; background: white; flex-direction: column; padding: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); border-top: 1px solid #eee; }
            .nav-links.active { display: flex !important; }
            .nav-link, .nav-btn { width: 100%; text-align: center; padding: 15px 0; border-radius: 8px; }
            .nav-btn { margin-top: 10px; }
        }
    </style>
</head>
<body>
    <nav style="display: flex; flex-direction: column; padding: 0 !important;">
        <a href="index.html" class="nav-brand" style="width: 100%; justify-content: center; background: #fff; padding: 0;">
            <img src="images/image.png" alt="Healthcare Clinical Laboratory - Jowar, Buner" style="width: 100%; height: auto; max-height: 225px; object-fit: contain; display: block;">
        </a>
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; padding: 12px 20px; position: relative; border-top: 1px solid #f0f0f0;">
            <a href="#" onclick="history.back(); return false;" aria-label="Go Back" style="display: flex; align-items: center; gap: 5px; color: #4a90e2; text-decoration: none; font-weight: 700; z-index: 10;">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Back
            </a>
            <button id="mobileMenuBtn" aria-label="Toggle menu" style="position: absolute; left: 50%; transform: translateX(-50%); top: 12px; z-index: 10;">
                <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
            </button>
            <div id="navLinks" class="nav-links" style="margin: 0 auto;">
                <a href="index.html" class="nav-link">Home</a>
                <a href="tests.html" class="nav-link">Explore Tests</a>
                <a href="booking.html" class="nav-link" style="color:#4a90e2;">Book Appointment</a>
                <a href="reports.html" class="nav-btn">View My Reports</a>
            </div>
        </div>
    </nav>
    
    <!-- Floating WhatsApp Widget -->
    <button id="waFloatBtn" class="wa-float" aria-label="Chat on WhatsApp">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
    </button>
    <div id="waPopup" class="wa-popup">
        <div class="wa-header">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
            Healthcare Clinical Lab Support
            <button id="waCloseBtn" class="wa-close">&times;</button>
        </div>
        <div class="wa-body">
            <div class="wa-form-group-wa">
                <label>How can we help you?</label>
                <select id="waCategory" class="wa-select">
                    <option value="Report Inquiry">I need help with a Report</option>
                    <option value="Test Information">I want to know about Tests</option>
                    <option value="Home Collection Query">I need Home Sample Collection</option>
                    <option value="Booking Question">I have a Booking Question</option>
                    <option value="General Question">General Question</option>
                </select>
            </div>
            <div class="wa-form-group-wa">
                <label>Your Message</label>
                <textarea id="waMessage" class="wa-textarea" placeholder="Type your message here..."></textarea>
            </div>
            <button id="waSendBtn" class="wa-send-btn">
                Send to WhatsApp
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
    </div>

    <div class="main-wrapper">
        <div class="container">
            <div class="header">
                <div class="logo">Healthcare Clinical Laboratory - Jowar, Buner</div>
                <div class="subtitle">Book Your Test Appointment</div>
                <p style="color: #666; font-size: 14px;">Fill out the form below to initiate a booking via WhatsApp.</p>
            </div>
            
            <form id="bookingForm" onsubmit="submitBooking(event)">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name">
                </div>
                <div class="form-group">
                    <label for="date">Preferred Date</label>
                    <input type="date" id="date" required>
                </div>
                <div class="form-group">
                    <label for="testType">Test Required</label>
                    <select id="testType" required>
                        <option value="" disabled selected>Select a test...</option>
                        <option value="Blood Test (CBC)">Blood Test (CBC)</option>
                        <option value="Blood Sugar">Blood Sugar</option>
                        <option value="Liver Function Test">Liver Function Test</option>
                        <option value="Urine Routine">Urine Routine</option>
                        <option value="Lipid Profile">Lipid Profile</option>
                        <option value="Renal Function Test">Renal Function Test</option>
                        <option value="Thyroid Profile">Thyroid Profile</option>
                        <option value="Viral Markers">Viral Markers</option>
                        <option value="Widal Test">Widal Test</option>
                        <option value="Other / Not Sure">Other / Not Sure</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="serviceType">Service Type</label>
                    <select id="serviceType" required>
                        <option value="Visit Clinic">Visit Clinic (Opposite RHC Jowar)</option>
                        <option value="Home Sample Collection">Home Sample Collection</option>
                    </select>
                </div>
                <button type="submit" class="btn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                    Book via WhatsApp
                </button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const testParam = params.get('test');
            if (testParam) {
                const select = document.getElementById('testType');
                for (let i = 0; i < select.options.length; i++) {
                    if (select.options[i].value === testParam) {
                        select.selectedIndex = i;
                        break;
                    }
                }
            }
        });

        document.getElementById('mobileMenuBtn').addEventListener('click', function() {
            document.getElementById('navLinks').classList.toggle('active');
        });

        // WhatsApp Widget Logic
        const waFloatBtn = document.getElementById('waFloatBtn');
        const waPopup = document.getElementById('waPopup');
        const waCloseBtn = document.getElementById('waCloseBtn');
        const waSendBtn = document.getElementById('waSendBtn');
        
        waFloatBtn.addEventListener('click', () => {
            waPopup.classList.toggle('show');
        });
        
        waCloseBtn.addEventListener('click', () => {
            waPopup.classList.remove('show');
        });
        
        waSendBtn.addEventListener('click', () => {
            const category = document.getElementById('waCategory').value;
            const message = document.getElementById('waMessage').value;
            if(!message.trim()) { alert('Please enter a message.'); return; }
            
            const fullText = `*${category}*\n\n${message}`;
            window.open(`https://wa.me/923139232928?text=${encodeURIComponent(fullText)}`, '_blank');
            waPopup.classList.remove('show');
        });
        
        function submitBooking(e) {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const date = document.getElementById('date').value;
            const testType = document.getElementById('testType').value;
            const serviceType = document.getElementById('serviceType').value;
            
            const message = `Hello Healthcare Clinical Laboratory - Jowar, Buner! I would like to book an appointment.\n\n*Name:* ${name}\n*Date:* ${date}\n*Test Needed:* ${testType}\n*Service:* ${serviceType}\n\nPlease let me know the timing and details.`;
            
            const whatsappUrl = `https://wa.me/923139232928?text=${encodeURIComponent(message)}`;
            window.location.href = whatsappUrl;
        }
    </script>
</body>
</html>
