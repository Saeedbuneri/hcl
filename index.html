<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Healthcare Clinical Laboratory - View Report</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            width: 90%;
            max-width: 800px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo {
            color: #4a90e2;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus {
            outline: none;
            border-color: #4a90e2;
        }
        
        .btn {
            width: 100%;
            background: linear-gradient(135deg, #4a90e2, #357abd);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: linear-gradient(135deg, #28a745, #20a037);
        }
        
        .report-container {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }
        
        .patient-info {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .test-results {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        
        .error {
            color: #e74c3c;
            text-align: center;
            margin-top: 15px;
            display: none;
        }
        
        .loading {
            text-align: center;
            color: #666;
            display: none;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            color: #666;
            font-size: 12px;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        
        .btn-inline {
            flex: 1;
            width: auto;
            margin-bottom: 0;
        }

        @media print {
            body {
                background: white;
                margin: 0;
                padding: 20px;
            }
            .container {
                box-shadow: none;
                border-radius: 0;
                padding: 0;
                max-width: none;
                width: 100%;
            }
            .header {
                border-bottom: 2px solid #4a90e2;
                padding-bottom: 20px;
                margin-bottom: 30px;
            }
            .btn, .form-group, .loading, .error {
                display: none !important;
            }
            .report-container {
                display: block !important;
                background: white;
                padding: 0;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">Healthcare Clinical Laboratory</div>
            <div class="subtitle">Laboratory Report Access</div>
        </div>
        
        <form id="reportForm">
            <div class="form-group">
                <label for="patientId">Patient ID</label>
                <input type="text" id="patientId" name="patientId" placeholder="Enter your Patient ID" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your Password" required>
            </div>
            
            <button type="submit" class="btn">View Report</button>
        </form>
        
        <div class="loading" id="loading">
            Loading your report...
        </div>
        
        <div class="error" id="error">
            Invalid Patient ID or Password. Please check your credentials and try again.
        </div>
        
        <div class="report-container" id="reportContainer">
            <div class="patient-info">
                <h3>Patient Information</h3>
                <div id="patientDetails"></div>
            </div>
            
            <div class="test-results">
                <h3>Test Results</h3>
                <div id="testResults"></div>
            </div>
            
            <div class="test-results" id="commentsSection" style="display: none;">
                <h3>Doctor's Comments</h3>
                <div id="doctorComments"></div>
            </div>
            
            <div class="test-results">
                <h3>Billing Information</h3>
                <div id="billingInfo"></div>
            </div>
            
            <div class="action-buttons">
                <button class="btn btn-inline btn-secondary" onclick="downloadPDF()">
                    Download PDF Report
                </button>
                <button class="btn btn-inline" onclick="printReport()">
                    Print Report
                </button>
            </div>
        </div>
        
        <div class="footer">
            Software by Saeed | Healthcare Clinical Laboratory
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js';
        import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyCNG8PPXxuV_BEXo9ydXpcnuFu8J3o897k",
            authDomain: "healthcare-33ed4.firebaseapp.com",
            projectId: "healthcare-33ed4",
            storageBucket: "healthcare-33ed4.firebasestorage.app",
            messagingSenderId: "1010321513051",
            appId: "1:1010321513051:web:1170990b0e440a895dbd7e",
            measurementId: "G-VSHB9YC5E2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.currentReportData = null;

        document.getElementById('reportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const patientId = document.getElementById('patientId').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!patientId || !password) {
                showError('Please enter both Patient ID and Password');
                return;
            }
            
            showLoading(true);
            hideError();
            hideReport();
            
            try {
                const reportRef = doc(db, 'reports', patientId);
                const reportSnap = await getDoc(reportRef);
                
                if (reportSnap.exists()) {
                    const reportData = reportSnap.data();
                    
                    if (reportData.password === password) {
                        window.currentReportData = reportData;
                        displayReport(reportData);
                    } else {
                        showError('Invalid Password. Please check and try again.');
                    }
                } else {
                    showError('Report not found. Please check your Patient ID.');
                }
            } catch (error) {
                console.error('Error fetching report:', error);
                showError('Unable to fetch report. Please try again later.');
            }
            
            showLoading(false);
        });

        function showLoading(show) {
            document.getElementById('loading').style.display = show ? 'block' : 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function hideReport() {
            document.getElementById('reportContainer').style.display = 'none';
        }

        function displayReport(reportData) {
            const patientDetails = document.getElementById('patientDetails');
            patientDetails.innerHTML = `
                <table style="width: 100%; border: none;">
                    <tr><td style="border: none; font-weight: bold;">Patient ID:</td><td style="border: none;">${reportData.patient_id}</td></tr>
                    <tr><td style="border: none; font-weight: bold;">Name:</td><td style="border: none;">${reportData.patient_name}</td></tr>
                    <tr><td style="border: none; font-weight: bold;">Age:</td><td style="border: none;">${reportData.age}</td></tr>
                    <tr><td style="border: none; font-weight: bold;">Gender:</td><td style="border: none;">${reportData.gender}</td></tr>
                    <tr><td style="border: none; font-weight: bold;">Contact:</td><td style="border: none;">${reportData.contact}</td></tr>
                    <tr><td style="border: none; font-weight: bold;">Date:</td><td style="border: none;">${reportData.date}</td></tr>
                    <tr><td style="border: none; font-weight: bold;">Test:</td><td style="border: none;">${reportData.test_name}</td></tr>
                </table>
            `;

            const testResults = document.getElementById('testResults');
            if (reportData.test_results && typeof reportData.test_results === 'object') {
                let resultsTable = `<table><thead><tr><th>Parameter</th><th>Value</th><th>Unit</th><th>Reference Range</th></tr></thead><tbody>`;
                
                for (const [param, value] of Object.entries(reportData.test_results)) {
                    resultsTable += `<tr><td>${param}</td><td><strong>${value}</strong></td><td>-</td><td>-</td></tr>`;
                }
                
                resultsTable += `</tbody></table>`;
                testResults.innerHTML = resultsTable;
            } else {
                testResults.innerHTML = '<p>No test results available.</p>';
            }

            if (reportData.comments && reportData.comments.trim()) {
                document.getElementById('commentsSection').style.display = 'block';
                document.getElementById('doctorComments').innerHTML = `
                    <p style="background: #f8f9fa; padding: 15px; border-radius: 5px; border-left: 4px solid #4a90e2;">${reportData.comments}</p>
                `;
            } else {
                document.getElementById('commentsSection').style.display = 'none';
            }

            const billingInfo = document.getElementById('billingInfo');
            billingInfo.innerHTML = `
                <table style="width: 100%;">
                    <tr><td style="font-weight: bold;">Base Price:</td><td style="text-align: right;">₹${reportData.base_price}</td></tr>
                    <tr><td style="font-weight: bold;">Discount:</td><td style="text-align: right;">${reportData.discount}%</td></tr>
                    <tr><td style="font-weight: bold;">Final Price:</td><td style="text-align: right;">₹${reportData.final_price}</td></tr>
                    <tr><td style="font-weight: bold;">Paid Amount:</td><td style="text-align: right;">₹${reportData.paid_amount}</td></tr>
                    <tr style="background: ${reportData.due_amount > 0 ? '#ffebee' : '#e8f5e8'};">
                        <td style="font-weight: bold;">Due Amount:</td>
                        <td style="text-align: right; font-weight: bold; color: ${reportData.due_amount > 0 ? '#d32f2f' : '#2e7d32'};">
                            ₹${reportData.due_amount}
                        </td>
                    </tr>
                </table>
            `;

            document.getElementById('reportContainer').style.display = 'block';
        }

        window.showLoading = showLoading;
        window.showError = showError;
        window.hideError = hideError;
        window.hideReport = hideReport;
        window.displayReport = displayReport;

        const urlParams = new URLSearchParams(window.location.search);
        const urlPatientId = urlParams.get('patient_id');
        const urlPassword = urlParams.get('password');

        if (urlPatientId && urlPassword) {
            document.getElementById('patientId').value = urlPatientId;
            document.getElementById('password').value = urlPassword;
            document.getElementById('reportForm').dispatchEvent(new Event('submit'));
        }
    </script>

    <script>
        function downloadPDF() {
            if (!window.currentReportData) {
                alert('No report data available');
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const reportData = window.currentReportData;

            doc.setFontSize(20);
            doc.setTextColor(74, 144, 226);
            doc.text('Healthcare Clinical Laboratory', 20, 30);
            
            doc.setFontSize(16);
            doc.text('Laboratory Report', 20, 45);

            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text('Patient Information:', 20, 65);
            
            doc.setFontSize(10);
            let yPos = 75;
            
            doc.text(`Patient ID: ${reportData.patient_id}`, 20, yPos);
            doc.text(`Name: ${reportData.patient_name}`, 20, yPos + 10);
            doc.text(`Age: ${reportData.age}`, 20, yPos + 20);
            doc.text(`Gender: ${reportData.gender}`, 20, yPos + 30);
            doc.text(`Contact: ${reportData.contact}`, 20, yPos + 40);
            doc.text(`Date: ${reportData.date}`, 20, yPos + 50);
            doc.text(`Test: ${reportData.test_name}`, 20, yPos + 60);

            yPos += 80;
            doc.setFontSize(14);
            doc.text('Test Results:', 20, yPos);
            
            doc.setFontSize(10);
            yPos += 15;
            
            if (reportData.test_results && typeof reportData.test_results === 'object') {
                doc.text('Parameter', 20, yPos);
                doc.text('Value', 80, yPos);
                doc.text('Unit', 120, yPos);
                doc.text('Reference Range', 150, yPos);
                
                yPos += 10;
                doc.line(20, yPos, 190, yPos);
                yPos += 5;
                
                for (const [param, value] of Object.entries(reportData.test_results)) {
                    doc.text(param, 20, yPos);
                    doc.text(String(value), 80, yPos);
                    doc.text('-', 120, yPos);
                    doc.text('-', 150, yPos);
                    yPos += 10;
                }
            }

            if (reportData.comments && reportData.comments.trim()) {
                yPos += 10;
                doc.setFontSize(14);
                doc.text('Doctor\'s Comments:', 20, yPos);
                doc.setFontSize(10);
                yPos += 10;
                
                const splitComments = doc.splitTextToSize(reportData.comments, 170);
                doc.text(splitComments, 20, yPos);
                yPos += splitComments.length * 5;
            }

            yPos += 20;
            doc.setFontSize(14);
            doc.text('Billing Information:', 20, yPos);
            doc.setFontSize(10);
            yPos += 15;
            
            doc.text(`Base Price: ₹${reportData.base_price}`, 20, yPos);
            doc.text(`Discount: ${reportData.discount}%`, 20, yPos + 10);
            doc.text(`Final Price: ₹${reportData.final_price}`, 20, yPos + 20);
            doc.text(`Paid Amount: ₹${reportData.paid_amount}`, 20, yPos + 30);
            doc.text(`Due Amount: ₹${reportData.due_amount}`, 20, yPos + 40);

            doc.setFontSize(8);
            doc.setTextColor(128, 128, 128);
            doc.text('Software by Saeed | Healthcare Clinical Laboratory', 20, 280);

            doc.save(`Lab_Report_${reportData.patient_id}.pdf`);
        }

        function printReport() {
            if (!window.currentReportData) {
                alert('No report data available');
                return;
            }
            window.print();
        }
    </script>
</body>
</html>
